<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spelling Star ⭐</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --success: #4ecca3;
    --text: #eee;
    --gold: #ffd700;
  }
  
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  .screen { display: none; width: 100%; max-width: 500px; padding: 20px; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  h1 { font-size: 2rem; margin: 20px 0; text-align: center; }
  h2 { font-size: 1.4rem; margin: 10px 0; text-align: center; color: #aaa; }

  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 18px 36px;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    margin: 10px;
    transition: transform 0.1s, opacity 0.2s;
    min-width: 200px;
    text-align: center;
  }
  .btn:active { transform: scale(0.95); }
  .btn.success { background: var(--success); }
  .btn.gold { background: var(--gold); color: #333; }
  .btn.secondary { background: #333; color: #ccc; font-size: 1rem; padding: 12px 24px; min-width: auto; }
  .btn.purple { background: #7c3aed; }

  /* Parent setup screen */
  #parent-screen textarea {
    width: 100%;
    min-height: 200px;
    background: var(--card);
    color: var(--text);
    border: 2px solid #333;
    border-radius: 12px;
    padding: 16px;
    font-size: 1.1rem;
    font-family: inherit;
    resize: vertical;
    margin: 10px 0;
  }
  #parent-screen textarea:focus { border-color: var(--accent); outline: none; }
  .hint { color: #888; font-size: 0.9rem; margin: 5px 0; text-align: center; }

  /* Game screen */
  .word-num { font-size: 1rem; color: #666; margin-bottom: 5px; }
  
  .hear-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    font-size: 2.5rem;
    cursor: pointer;
    margin: 15px 0;
    transition: transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hear-btn:active { transform: scale(0.9); }

  .input-area {
    width: 100%;
    margin: 15px 0;
  }
  
  #spell-input {
    width: 100%;
    padding: 20px;
    font-size: 2rem;
    text-align: center;
    background: var(--card);
    color: var(--text);
    border: 3px solid #333;
    border-radius: 16px;
    font-family: inherit;
    letter-spacing: 4px;
    text-transform: lowercase;
  }
  #spell-input:focus { border-color: var(--accent); outline: none; }
  #spell-input.correct { border-color: var(--success); background: #1a3a2a; }
  #spell-input.wrong { border-color: var(--accent); background: #3a1a1a; }

  .feedback {
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
    margin: 8px 0;
  }
  .feedback .correct-word {
    font-size: 1.1rem;
    color: #aaa;
    margin-top: 8px;
    letter-spacing: 2px;
  }

  .stars { font-size: 2rem; margin: 8px 0; min-height: 36px; }
  .streak { font-size: 1rem; color: var(--gold); min-height: 24px; }
  
  .attempts { display: flex; gap: 8px; margin: 8px 0; }
  .attempt-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: #333; border: 2px solid #555;
  }
  .attempt-dot.used { background: var(--accent); border-color: var(--accent); }
  .attempt-dot.correct { background: var(--success); border-color: var(--success); }

  /* Writing canvas */
  .canvas-container {
    position: relative;
    width: 100%;
    max-width: 460px;
    margin: 10px 0;
  }
  .writing-canvas {
    width: 100%;
    height: 200px;
    background: var(--card);
    border: 3px solid #333;
    border-radius: 16px;
    touch-action: none;
    cursor: crosshair;
  }
  .writing-canvas.active { border-color: #7c3aed; }
  .canvas-label {
    font-size: 0.9rem;
    color: #888;
    text-align: center;
    margin: 4px 0;
  }
  .canvas-tools {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 8px 0;
  }
  .canvas-tools button {
    background: #333;
    color: #ccc;
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .canvas-tools button:active { background: #555; }

  /* Letter practice */
  .letter-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    width: 100%;
    margin: 15px 0;
  }
  .letter-btn {
    aspect-ratio: 1;
    background: var(--card);
    border: 2px solid #333;
    border-radius: 12px;
    color: var(--text);
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .letter-btn:active { background: #7c3aed; border-color: #7c3aed; }
  .letter-btn.practised { border-color: var(--success); }

  .practice-canvas {
    width: 100%;
    height: 300px;
    background: var(--card);
    border: 3px solid #7c3aed;
    border-radius: 16px;
    touch-action: none;
    cursor: crosshair;
  }

  .guide-text {
    font-size: 1.2rem;
    color: #aaa;
    text-align: center;
    margin: 10px 0;
  }

  /* Pen colour picker */
  .pen-colours {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 10px 0;
  }
  .pen-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .pen-dot:active { transform: scale(0.9); }
  .pen-dot.selected { border-color: white; transform: scale(1.15); }

  /* Results */
  .result-card {
    background: var(--card);
    border-radius: 16px;
    padding: 30px;
    width: 100%;
    text-align: center;
    margin: 20px 0;
  }
  .big-score { font-size: 4rem; font-weight: 900; color: var(--gold); }
  .result-list { list-style: none; width: 100%; margin: 20px 0; }
  .result-list li {
    padding: 12px 16px;
    background: var(--card);
    border-radius: 10px;
    margin: 6px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1.2rem;
  }
  .result-list li.got-it { border-left: 4px solid var(--success); }
  .result-list li.missed { border-left: 4px solid var(--accent); }

  #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }

  /* Toggle switch for handwriting mode */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 15px 0;
    font-size: 1rem;
    color: #aaa;
  }
  .toggle {
    position: relative;
    width: 52px;
    height: 28px;
    background: #333;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on { background: #7c3aed; }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(24px); }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<!-- MENU SCREEN -->
<div id="menu-screen" class="screen active">
  <h1>⭐ Spelling Star</h1>
  <h2>Ready to practise?</h2>
  <div id="current-words-info" style="margin: 15px 0; color: #aaa;"></div>
  <button class="btn" id="play-btn" onclick="startGame()">▶️ Spelling Test</button>
  <button class="btn purple" onclick="showScreen('letter-screen')">✍️ Letter Practice</button>
  <button class="btn secondary" onclick="showScreen('parent-screen')">📝 Set Words</button>
  <div id="best-score" style="margin-top: 20px; color: var(--gold);"></div>
</div>

<!-- PARENT SETUP SCREEN -->
<div id="parent-screen" class="screen">
  <h1>📝 Spelling Words</h1>
  <h2>One word per line</h2>
  <textarea id="words-input" placeholder="cat&#10;dog&#10;the&#10;said&#10;have"></textarea>
  <p class="hint">Paste or type the words from the spelling test</p>
  <div class="toggle-row">
    <div class="toggle" id="handwriting-toggle" onclick="toggleHandwriting()"></div>
    <span>✍️ Write words before spelling</span>
  </div>
  <button class="btn success" onclick="saveWords()">✅ Save Words</button>
  <button class="btn secondary" onclick="showScreen('menu-screen')">← Back</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="word-num" id="word-progress"></div>
  <div class="stars" id="stars-display"></div>
  <div class="streak" id="streak-display"></div>
  
  <button class="hear-btn" id="hear-btn" onclick="sayWord()">🔊</button>
  <p class="hint" id="hear-hint">Tap to hear the word</p>

  <!-- Handwriting step (shown before typing if enabled) -->
  <div id="writing-step" style="display:none; width:100%;">
    <div class="canvas-label">✍️ Write the word with your finger</div>
    <div class="canvas-container">
      <canvas class="writing-canvas" id="spell-canvas"></canvas>
    </div>
    <div class="pen-colours" id="spell-pen-colours"></div>
    <div class="canvas-tools">
      <button onclick="clearCanvas('spell-canvas')">🗑️ Clear</button>
      <button class="btn success" style="padding:10px 24px; margin:0; min-width:auto; font-size:1rem;" onclick="doneWriting()">Done ✍️ → Type it</button>
    </div>
  </div>
  
  <!-- Typing step -->
  <div id="typing-step" style="width:100%;">
    <div class="input-area">
      <input type="text" id="spell-input" autocomplete="off" autocapitalize="none" spellcheck="false" autocorrect="off">
    </div>
    <div class="attempts" id="attempts-display"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn" id="check-btn" onclick="checkSpelling()">Check ✓</button>
    <button class="btn success" id="next-btn" onclick="nextWord()" style="display:none;">Next →</button>
  </div>
</div>

<!-- LETTER PRACTICE SCREEN -->
<div id="letter-screen" class="screen">
  <h1>✍️ Letter Practice</h1>
  <h2>Pick a letter to practise</h2>
  <div class="letter-grid" id="letter-grid"></div>
  <button class="btn secondary" onclick="showScreen('menu-screen')">← Back</button>
</div>

<!-- LETTER DRAW SCREEN -->
<div id="letter-draw-screen" class="screen">
  <h1 id="practice-letter-title"></h1>
  <div class="guide-text" id="practice-guide"></div>
  <div class="canvas-container" style="max-width:460px; width:100%;">
    <canvas class="practice-canvas" id="practice-canvas"></canvas>
  </div>
  <div class="pen-colours" id="practice-pen-colours"></div>
  <div class="canvas-tools">
    <button onclick="clearCanvas('practice-canvas')">🗑️ Clear</button>
    <button onclick="showGuide()">👁️ Show Guide</button>
    <button onclick="nextPracticeLetter()">Next →</button>
  </div>
  <div id="practice-count" style="margin-top:15px; color:var(--gold);"></div>
  <button class="btn secondary" style="margin-top:15px;" onclick="showScreen('letter-screen')">← Back to Letters</button>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen" class="screen">
  <h1>🏆 Results!</h1>
  <div class="result-card">
    <div class="big-score" id="final-score"></div>
    <p id="final-message" style="margin-top: 10px; font-size: 1.2rem;"></p>
  </div>
  <ul class="result-list" id="result-list"></ul>
  <button class="btn gold" onclick="startGame()">🔁 Try Again</button>
  <button class="btn secondary" onclick="showScreen('menu-screen')">← Home</button>
</div>

<script>
  // --- State ---
  let words = [];
  let currentIndex = 0;
  let results = [];
  let streak = 0;
  let maxAttempts = 3;
  let attemptsUsed = 0;
  let answered = false;
  let handwritingEnabled = true;
  let inWritingStep = false;

  // Drawing state
  const canvasState = {};
  let currentPenColour = '#e94560';
  const penColours = [
    { colour: '#e94560', name: 'Red' },
    { colour: '#4ecca3', name: 'Green' },
    { colour: '#ffd700', name: 'Gold' },
    { colour: '#00d2ff', name: 'Blue' },
    { colour: '#ff6b6b', name: 'Pink' },
    { colour: '#a855f7', name: 'Purple' },
    { colour: '#ffffff', name: 'White' },
  ];

  // Letter practice state
  let currentPracticeLetter = '';
  let practiceCount = 0;
  let practisedLetters = JSON.parse(localStorage.getItem('practised-letters') || '{}');

  // --- Init ---
  function init() {
    const saved = localStorage.getItem('spelling-words');
    if (saved) {
      words = JSON.parse(saved);
      updateWordsInfo();
    }
    handwritingEnabled = localStorage.getItem('handwriting-mode') !== 'false';
    updateToggle();
    updateBestScore();
    buildLetterGrid();
    buildPenPickers();
    
    document.getElementById('spell-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (answered) nextWord();
        else checkSpelling();
      }
    });
  }

  // --- Pen colour picker ---
  function buildPenPickers() {
    ['spell-pen-colours', 'practice-pen-colours'].forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = penColours.map(p =>
        `<div class="pen-dot ${p.colour === currentPenColour ? 'selected' : ''}" 
              style="background:${p.colour}" 
              onclick="selectPen('${p.colour}')"></div>`
      ).join('');
    });
  }

  function selectPen(colour) {
    currentPenColour = colour;
    buildPenPickers();
  }

  // --- Screen management ---
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    if (id === 'parent-screen') {
      document.getElementById('words-input').value = words.join('\n');
    }
    if (id === 'menu-screen') {
      updateWordsInfo();
      updateBestScore();
    }
  }

  // --- Toggle handwriting ---
  function toggleHandwriting() {
    handwritingEnabled = !handwritingEnabled;
    localStorage.setItem('handwriting-mode', handwritingEnabled);
    updateToggle();
  }
  function updateToggle() {
    const el = document.getElementById('handwriting-toggle');
    if (handwritingEnabled) el.classList.add('on');
    else el.classList.remove('on');
  }

  // --- Parent: save words ---
  function saveWords() {
    const raw = document.getElementById('words-input').value;
    words = raw.split('\n').map(w => w.trim().toLowerCase()).filter(w => w.length > 0);
    if (words.length === 0) { alert('Add at least one word!'); return; }
    localStorage.setItem('spelling-words', JSON.stringify(words));
    showScreen('menu-screen');
  }

  function updateWordsInfo() {
    const el = document.getElementById('current-words-info');
    const playBtn = document.getElementById('play-btn');
    if (words.length > 0) {
      el.textContent = `${words.length} word${words.length > 1 ? 's' : ''} loaded`;
      playBtn.style.opacity = '1';
      playBtn.disabled = false;
    } else {
      el.textContent = 'No words yet — tap Set Words to add some!';
      playBtn.style.opacity = '0.4';
      playBtn.disabled = true;
    }
  }

  function updateBestScore() {
    const best = localStorage.getItem('spelling-best');
    const el = document.getElementById('best-score');
    if (best && words.length > 0) el.textContent = `⭐ Best: ${best}/${words.length}`;
    else el.textContent = '';
  }

  // --- Drawing Canvas ---
  function initCanvas(canvasId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    
    // Set actual pixel size
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    
    const state = { drawing: false, lastX: 0, lastY: 0 };
    canvasState[canvasId] = state;

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const touch = e.touches ? e.touches[0] : e;
      return { x: touch.clientX - r.left, y: touch.clientY - r.top };
    }

    function startDraw(e) {
      e.preventDefault();
      state.drawing = true;
      const pos = getPos(e);
      state.lastX = pos.x;
      state.lastY = pos.y;
      canvas.classList.add('active');
    }

    function draw(e) {
      e.preventDefault();
      if (!state.drawing) return;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(state.lastX, state.lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = currentPenColour;
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      state.lastX = pos.x;
      state.lastY = pos.y;
    }

    function stopDraw(e) {
      e.preventDefault();
      state.drawing = false;
      canvas.classList.remove('active');
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw, { passive: false });
    canvas.addEventListener('touchcancel', stopDraw, { passive: false });
  }

  function clearCanvas(canvasId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // --- Spelling Game ---
  function startGame() {
    if (words.length === 0) { showScreen('parent-screen'); return; }
    currentIndex = 0;
    results = [];
    streak = 0;
    showScreen('game-screen');
    loadWord();
  }

  function loadWord() {
    answered = false;
    attemptsUsed = 0;
    inWritingStep = handwritingEnabled;
    
    const input = document.getElementById('spell-input');
    input.value = '';
    input.className = '';
    input.disabled = false;
    
    document.getElementById('check-btn').style.display = '';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('feedback').innerHTML = '';
    document.getElementById('word-progress').textContent = `Word ${currentIndex + 1} of ${words.length}`;
    document.getElementById('stars-display').textContent = '⭐'.repeat(results.filter(r => r.gotIt).length);
    document.getElementById('streak-display').textContent = streak >= 2 ? `🔥 ${streak} in a row!` : '';
    updateAttemptDots();

    if (handwritingEnabled) {
      document.getElementById('writing-step').style.display = '';
      document.getElementById('typing-step').style.display = 'none';
      document.getElementById('hear-hint').textContent = 'Tap to hear, then write it!';
      // Init canvas after it's visible
      setTimeout(() => {
        initCanvas('spell-canvas');
        clearCanvas('spell-canvas');
      }, 50);
    } else {
      document.getElementById('writing-step').style.display = 'none';
      document.getElementById('typing-step').style.display = '';
      document.getElementById('hear-hint').textContent = 'Tap to hear the word';
      input.focus();
    }
    
    setTimeout(() => sayWord(), 400);
  }

  function doneWriting() {
    inWritingStep = false;
    document.getElementById('writing-step').style.display = 'none';
    document.getElementById('typing-step').style.display = '';
    document.getElementById('hear-hint').textContent = 'Now type it!';
    document.getElementById('spell-input').focus();
  }

  function updateAttemptDots() {
    const el = document.getElementById('attempts-display');
    let html = '';
    for (let i = 0; i < maxAttempts; i++) {
      let cls = 'attempt-dot';
      if (i < attemptsUsed) cls += ' used';
      html += `<div class="${cls}"></div>`;
    }
    el.innerHTML = html;
  }

  function sayWord() {
    const word = words[currentIndex];
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(word);
      utter.lang = 'en-GB';
      utter.rate = 0.8;
      const voices = window.speechSynthesis.getVoices();
      const ukVoice = voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
      if (ukVoice) utter.voice = ukVoice;
      window.speechSynthesis.speak(utter);
    }
    const btn = document.getElementById('hear-btn');
    btn.style.transform = 'scale(1.1)';
    setTimeout(() => btn.style.transform = '', 200);
  }

  function checkSpelling() {
    if (answered) return;
    const input = document.getElementById('spell-input');
    const guess = input.value.trim().toLowerCase();
    const correct = words[currentIndex];
    
    if (!guess) {
      input.style.transform = 'translateX(-10px)';
      setTimeout(() => input.style.transform = '', 100);
      return;
    }

    if (guess === correct) {
      answered = true;
      input.className = 'correct';
      input.disabled = true;
      streak++;
      
      const dots = document.querySelectorAll('.attempt-dot');
      dots.forEach((d, i) => { if (i <= attemptsUsed) d.className = 'attempt-dot correct'; });
      
      const messages = ['Amazing! 🎉', 'Brilliant! ⭐', 'You got it! 💪', 'Super star! 🌟', 'Nailed it! 🎯', 'Fantastic! 🚀'];
      document.getElementById('feedback').innerHTML = messages[Math.floor(Math.random() * messages.length)];
      results.push({ word: correct, attempts: attemptsUsed + 1, gotIt: true });
      
      document.getElementById('check-btn').style.display = 'none';
      document.getElementById('next-btn').style.display = '';
      document.getElementById('stars-display').textContent = '⭐'.repeat(results.filter(r => r.gotIt).length);
      document.getElementById('streak-display').textContent = streak >= 2 ? `🔥 ${streak} in a row!` : '';
      
      if (attemptsUsed === 0) fireConfetti();
    } else {
      attemptsUsed++;
      updateAttemptDots();
      input.className = 'wrong';
      setTimeout(() => input.className = '', 500);
      
      if (attemptsUsed >= maxAttempts) {
        answered = true;
        input.disabled = true;
        streak = 0;
        document.getElementById('feedback').innerHTML = 
          `Not quite 😊<span class="correct-word">It was: <strong>${correct}</strong></span>`;
        document.getElementById('streak-display').textContent = '';
        results.push({ word: correct, attempts: attemptsUsed, gotIt: false });
        document.getElementById('check-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = '';
        setTimeout(() => {
          if ('speechSynthesis' in window) {
            const utter = new SpeechSynthesisUtterance(correct);
            utter.lang = 'en-GB';
            utter.rate = 0.6;
            window.speechSynthesis.speak(utter);
          }
        }, 500);
      } else {
        const hints = [];
        if (attemptsUsed === 1) hints.push(`Hint: it has ${correct.length} letters`);
        if (attemptsUsed === 2) hints.push(`Hint: it starts with "${correct[0]}"`);
        document.getElementById('feedback').innerHTML = `Try again! ${hints[0] || ''}`;
        input.value = '';
        input.focus();
      }
    }
  }

  function nextWord() {
    currentIndex++;
    if (currentIndex >= words.length) showResults();
    else loadWord();
  }

  // --- Results ---
  function showResults() {
    showScreen('results-screen');
    const correct = results.filter(r => r.gotIt).length;
    const total = results.length;
    const pct = Math.round((correct / total) * 100);
    
    document.getElementById('final-score').textContent = `${correct}/${total}`;
    
    let msg = '';
    if (pct === 100) msg = 'PERFECT! You\'re a Spelling Star! 🌟';
    else if (pct >= 80) msg = 'Amazing work! So close to perfect! 🎉';
    else if (pct >= 60) msg = 'Great effort! Keep practising! 💪';
    else if (pct >= 40) msg = 'Good try! You\'re getting better! 📈';
    else msg = 'Keep going! Practice makes perfect! 🌱';
    
    document.getElementById('final-message').textContent = msg;
    
    document.getElementById('result-list').innerHTML = results.map(r => `
      <li class="${r.gotIt ? 'got-it' : 'missed'}">
        <span>${r.word}</span>
        <span>${r.gotIt ? (r.attempts === 1 ? '⭐' : `✅ (${r.attempts} tries)`) : '❌'}</span>
      </li>
    `).join('');
    
    const prev = parseInt(localStorage.getItem('spelling-best') || '0');
    if (correct > prev) localStorage.setItem('spelling-best', correct.toString());
    if (pct === 100) fireConfetti();
  }

  // --- Letter Practice ---
  function buildLetterGrid() {
    const grid = document.getElementById('letter-grid');
    const letters = 'abcdefghijklmnopqrstuvwxyz'.split('');
    grid.innerHTML = letters.map(l => 
      `<button class="letter-btn ${practisedLetters[l] ? 'practised' : ''}" onclick="startLetterPractice('${l}')">${l}</button>`
    ).join('');
  }

  function startLetterPractice(letter) {
    currentPracticeLetter = letter;
    practiceCount = 0;
    showScreen('letter-draw-screen');
    document.getElementById('practice-letter-title').textContent = `✍️ Letter: ${letter.toUpperCase()} ${letter}`;
    
    const guides = {
      a: 'Start at 2 o\'clock → anticlockwise circle → up → straight down',
      b: 'Start at top → straight down → back up halfway → clockwise bump',
      c: 'Start at 2 o\'clock → anticlockwise curve → stop at 4 o\'clock',
      d: 'Start at 2 o\'clock → anticlockwise circle → up to top → straight down',
      e: 'Start in middle → right stroke → curve up and around anticlockwise',
      f: 'Start at top right → curve left and down → cross bar',
      g: 'Start at 2 o\'clock → anticlockwise circle → straight down below line → curl left',
      h: 'Start at top → straight down → back up halfway → arch over → down',
      i: 'Start at middle → straight down → dot on top',
      j: 'Start at middle → straight down below line → curl left → dot on top',
      k: 'Start at top → straight down → diagonal in from right → diagonal out to right',
      l: 'Start at top → straight down',
      m: 'Start at middle → down → up → arch over → down → up → arch over → down',
      n: 'Start at middle → down → back up → arch over → down',
      o: 'Start at 2 o\'clock → anticlockwise all the way around',
      p: 'Start at middle → straight down below line → back up → clockwise bump',
      q: 'Start at 2 o\'clock → anticlockwise circle → straight down below line → flick right',
      r: 'Start at middle → down → back up → small curve right',
      s: 'Start at top → curve left → curve back right → finish left',
      t: 'Start at top → straight down → cross bar',
      u: 'Start at middle → down → curve right → up → down',
      v: 'Start at top left → diagonal down to centre → diagonal up to right',
      w: 'Start at top → down → up → down → up (zigzag)',
      x: 'Diagonal down right → lift → diagonal down left',
      y: 'Start at top left → diagonal to centre → start top right → diagonal down through → below line',
      z: 'Left to right across top → diagonal down left → left to right across bottom'
    };
    
    document.getElementById('practice-guide').textContent = guides[letter] || `Trace the letter ${letter}`;
    document.getElementById('practice-count').textContent = '';
    
    setTimeout(() => {
      initCanvas('practice-canvas');
      showGuide();
    }, 50);
  }

  function showGuide() {
    const canvas = document.getElementById('practice-canvas');
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    
    // Draw the guide letter faintly
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.font = `${rect.height * 0.7 * window.devicePixelRatio}px -apple-system, sans-serif`;
    ctx.fillStyle = 'rgba(124, 58, 237, 0.15)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(currentPracticeLetter, canvas.width / 2, canvas.height / 2);
    ctx.restore();
    
    // Draw baseline
    const baseY = rect.height * 0.72;
    ctx.beginPath();
    ctx.moveTo(20, baseY * window.devicePixelRatio);
    ctx.lineTo((rect.width - 20) * window.devicePixelRatio, baseY * window.devicePixelRatio);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function nextPracticeLetter() {
    practiceCount++;
    document.getElementById('practice-count').textContent = `✅ Practised ${practiceCount} time${practiceCount > 1 ? 's' : ''}`;
    
    // Track as practised
    practisedLetters[currentPracticeLetter] = (practisedLetters[currentPracticeLetter] || 0) + 1;
    localStorage.setItem('practised-letters', JSON.stringify(practisedLetters));
    
    // Encouragement
    if (practiceCount === 3) fireConfetti();
    if (practiceCount === 5) {
      document.getElementById('practice-guide').textContent = '🌟 Five times! You\'re getting really good!';
      fireConfetti();
    }
    
    showGuide();
  }

  // --- Confetti ---
  function fireConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    const particles = [];
    const colors = ['#ffd700', '#e94560', '#4ecca3', '#00d2ff', '#ff6b6b', '#feca57'];
    
    for (let i = 0; i < 80; i++) {
      particles.push({
        x: canvas.width / 2 + (Math.random() - 0.5) * 200,
        y: canvas.height / 2,
        vx: (Math.random() - 0.5) * 15,
        vy: (Math.random() - 1) * 15 - 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 8 + 4,
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 10,
        life: 1
      });
    }
    
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      particles.forEach(p => {
        if (p.life <= 0) return;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3;
        p.rotation += p.rotSpeed;
        p.life -= 0.015;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();
      });
      if (alive) requestAnimationFrame(animate);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    animate();
  }

  // --- Voices ---
  if ('speechSynthesis' in window) {
    speechSynthesis.onvoiceschanged = () => {};
    speechSynthesis.getVoices();
  }

  init();
</script>
</body>
